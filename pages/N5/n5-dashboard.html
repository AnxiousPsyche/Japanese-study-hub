<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================================
         META
    ========================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="JP Library OS - JLPT N5 Journey">

    <title>JLPT N5 Journey</title>

    <!-- =========================================
         GOOGLE FONTS
    ========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">

    <!-- =========================================
         BOOTSTRAP
    ========================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- =========================================
         BOOTSTRAP ICONS
    ========================================== -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- =========================================
         CSS
    ========================================== -->

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">

    <!-- Dashboard CSS -->

    <link rel="stylesheet"
          href="../../assets/css/n5-dashboard.css">

</head>

<body>

    <div class="hud-left">

    <button class="hud-btn">

        🏠 Home

    </button>

    <button class="hud-btn">

        🗺 Journey

    </button>

    <button class="hud-btn">

        📚 Lessons

    </button>

</div>

<!-- =========================================
     RPG HUD
========================================== -->

<header id="gameHUD">

    <!-- Left -->

    <div class="hud-left">

        <button
            class="hud-btn"
            id="backDesktop">

            <i class="bi bi-house-door-fill"></i>

            Desktop

        </button>

    </div>

    <!-- Center -->

    <div class="hud-center">

        <img
            src="../../assets/images/logo/JPLnewlogo.png"
            alt="JP Library"
            class="hud-logo">

        <div class="hud-player">

            <img
                src="../../assets/images/avatars/default-avatar.png"
                id="playerAvatar"
                alt="Player">

            <div>

                <h3 id="playerDisplayName">

                    Explorer

                </h3>

                <span id="playerRank">

                    Grammar Adventurer

                </span>

            </div>

        </div>

    </div>

    <!-- Right -->

    <div class="hud-right">

        <div class="hud-item">

            ⭐

            <span id="playerXP">

                0 XP

            </span>

        </div>

        <div class="hud-item">

            ❤️

            <span id="playerLives">

                5

            </span>

        </div>

        <div class="hud-item">

            💰

            <span id="playerCoins">

                0

            </span>

        </div>

        <button
            id="musicButton"
            class="hud-btn">

            <i class="bi bi-volume-up-fill"></i>

        </button>

    </div>

</header>

<!-- =========================================
     JOURNEY MAP
========================================== -->

<main id="journeyMap">

    <div id="mapFrame">

    <!-- Background Image -->

    <img
        src="../../assets/images/backgrounds/n5-journey-map.png"
        alt="JLPT N5 Journey"
        class="journey-background">

    <!-- =====================================
         PLAYER CHARACTER
    ====================================== -->

    <div id="playerCharacter">

        <img
            src="../../assets/images/icons/pixels/fortunecat-Original.png"
            alt="Player">

    </div>

    <!-- =====================================
         START GATE
    ====================================== -->

    <div id="startGate">

        <img
            src="../../assets/images/map/torii.png"
            alt="Start Gate">

        <span>

            START

        </span>

    </div>

    <!-- =====================================
         MAP CONTAINER
         Lesson Nodes begin in Part 2
    ====================================== -->

    <div id="lessonMap">

            <!-- =====================================
         LESSON 1
    ====================================== -->

    <button
        class="lesson-node lesson-1"
        data-lesson="1">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 2
    ====================================== -->

    <button
        class="lesson-node lesson-2"
        data-lesson="2">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 3
    ====================================== -->

    <button
        class="lesson-node lesson-3"
        data-lesson="3">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 4
    ====================================== -->

    <button
        class="lesson-node lesson-4"
        data-lesson="4">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 5
    ====================================== -->

    <button
        class="lesson-node lesson-5"
        data-lesson="5">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 6
    ====================================== -->

    <button
        class="lesson-node lesson-6"
        data-lesson="6">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 7
    ====================================== -->

    <button
        class="lesson-node lesson-7"
        data-lesson="7">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         REVIEW CHECKPOINT
    ====================================== -->

    <button
        class="lesson-node review-node"
        data-lesson="review1">

        <span class="review-glow"></span>

    </button>

    <!-- =====================================
         LESSON 9
    ====================================== -->

    <button
        class="lesson-node lesson-9"
        data-lesson="9">

        <span class="node-glow"></span>

    </button>

        <!-- =====================================
         LESSON 10
    ====================================== -->

    <button
        class="lesson-node lesson-10"
        data-lesson="10">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 11
    ====================================== -->

    <button
        class="lesson-node lesson-11"
        data-lesson="11">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 12
    ====================================== -->

    <button
        class="lesson-node lesson-12"
        data-lesson="12">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         REVIEW CHECKPOINT 2
    ====================================== -->

    <button
        class="lesson-node review-node review-node-2"
        data-lesson="review2">

        <span class="review-glow"></span>

    </button>

    <!-- =====================================
         LESSON 13
    ====================================== -->

    <button
        class="lesson-node lesson-13"
        data-lesson="13">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 14
    ====================================== -->

    <button
        class="lesson-node lesson-14"
        data-lesson="14">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         LESSON 15
    ====================================== -->

    <button
        class="lesson-node lesson-15"
        data-lesson="15">

        <span class="node-glow"></span>

    </button>

    <!-- =====================================
         FINAL EXAM
    ====================================== -->

    <button
        class="lesson-node final-review"
        data-lesson="final">

        <span class="final-glow"></span>

    </button>

    <!-- =====================================
         TREASURE CHEST 1
    ====================================== -->

    <button
        class="treasure-node treasure-1">

        <img
            src="../../assets/images/map/treasure.png"
            alt="Treasure">

    </button>

    <!-- =====================================
         TREASURE CHEST 2
    ====================================== -->

    <button
        class="treasure-node treasure-2">

        <img
            src="../../assets/images/map/treasure.png"
            alt="Treasure">

    </button>

    <!-- =====================================
         TREASURE CHEST 3
    ====================================== -->

    <button
        class="treasure-node treasure-3">

        <img
            src="../../assets/images/map/treasure.png"
            alt="Treasure">

    </button>

    <!-- =====================================
         GOAL CASTLE
    ====================================== -->

    <div
        id="goalCastle">

        <img
            src="../../assets/images/map/goal-castle.png"
            alt="Goal Castle">

        <span>

            GOAL

        </span>

    </div>

    <!-- =====================================
         END OF MAP
         (scenery-sign overlays removed: the
         painted map art already carries this
         signage text, so the overlay divs were
         duplicating it)
    ====================================== -->

    </div>

    </div>

</main>

<!-- =========================================
     LESSON POPUP
========================================== -->

<div
    id="lessonPopup"
    class="lesson-popup">

    <div class="popup-window">

        <div class="popup-header">

            <h2 id="popupTitle">

                Lesson

            </h2>

            <button
                id="closePopup">

                ✕

            </button>

        </div>

        <div class="popup-body">

            <img
                id="popupImage"
                src="../../assets/images/icons/book.png"
                alt="Lesson">

            <h3 id="popupLessonTitle">

                Lesson Title

            </h3>

            <p id="popupLessonDescription">

                Lesson description...

            </p>

            <div
                class="lesson-rewards">

                ⭐ XP:
                <span id="popupXP">

                    +50

                </span>

            </div>

            <button
                id="startLessonButton"
                class="retro-btn">

                ▶ Start Lesson

            </button>

            <button
                id="favoriteLessonButton"
                class="retro-btn retro-btn-secondary">

                ⭐ Save/Favorite

            </button>

        </div>

    </div>

</div>

<!-- =========================================
     FOOTER
========================================== -->

<footer id="dashboardFooter">

    <div class="footer-left">

        🌸 JP Library OS • JLPT N5 Journey

    </div>

    <div class="footer-center">

        Continue your adventure one lesson at a time.

    </div>

    <div class="footer-right">

        Version 1.0

    </div>

</footer>

<!-- =========================================
     TELEPORT EFFECT
========================================== -->

<div id="teleport-overlay">

    <div class="teleport-beam"></div>

    <div class="teleport-flash"></div>

</div>

<!-- =========================================
     ACHIEVEMENT NOTIFICATIONS
========================================== -->

<div id="achievement-container"></div>

<!-- =========================================
     SAKURA PARTICLES
========================================== -->

<div id="sakura-container"></div>

<!-- =========================================
     BACKGROUND MUSIC
========================================== -->

<audio
    id="bgMusic"
    loop>

    <source
        src="../../assets/sounds/Nebulite - Kyoto (freetouse.com).mp3"
        type="audio/mpeg">

</audio>

<!-- =========================================
     TELEPORT SOUND
========================================== -->

<audio
    id="teleportSound">

    <source
        src="../../assets/sounds/teleportSound.mp3"
        type="audio/mpeg">

</audio>

<!-- =========================================
     JAVASCRIPT
========================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Core -->

<script src="../../assets/js/player.js"></script>

<script src="../../assets/js/sakura.js"></script>

<script src="../../assets/js/teleport.js"></script>

<script src="../../assets/js/achievement.js"></script>

<script src="../../assets/js/music-player.js"></script>

<!-- Dashboard -->

<script src="../../assets/js/n5-popup.js"></script>

<script src="../../assets/js/n5-save.js"></script>

<script src="../../assets/js/n5-map.js"></script>

</body>

</html>
