<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================================
         META
    ========================================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="JP Library OS - Learn Japanese through interactive lessons and adventures.">

    <title>JP Library OS | JLPT N5 Dashboard</title>

    <!-- =========================================
         GOOGLE FONTS
    ========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Press+Start+2P&display=swap"
          rel="stylesheet">

    <!-- =========================================
         BOOTSTRAP
    ========================================== -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- =========================================
         BOOTSTRAP ICONS
    ========================================== -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- =========================================
         CSS
    ========================================== -->

    <link rel="stylesheet" href="../../assets/css/reset.css">

    <link rel="stylesheet" href="../../assets/css/variables.css">

    <link rel="stylesheet" href="../../assets/css/components.css">

    <link rel="stylesheet" href="../../assets/css/os.css">

    <link rel="stylesheet" href="../../assets/css/n5-map.css">

    <link rel="stylesheet" href="../../assets/css/teleport.css">

    <link rel="stylesheet" href="../../assets/css/responsive.css">

</head>

<body>

<!-- =========================================
     TOP BAR
========================================== -->

<nav class="os-navbar">

    <div class="os-left">

        <img src="../../assets/images/logo/JPLlogo.png"
             alt="JP Library">

        <span>

            JP Library OS

        </span>

    </div>

    <div class="os-center">

        🌸 Sakura Village

    </div>

    <div class="os-right">

        <button
            class="os-btn"
            id="musicToggle">

            <img src="../../assets/images/icons/pixels/headphones.png"
                 alt="Music">

        </button>

        <button class="os-btn">

            <img src="../../assets/images/icons/pixels/magnifying-glass-3-Original.png"
                 alt="Search">

        </button>

        <button class="os-btn">

            <img src="../../assets/images/icons/pixels/mail.png"
                 alt="Mail">

        </button>

        <button class="os-btn">

            <img src="../../assets/images/icons/pixels/suit.png"
                 alt="Profile">

        </button>

        <button class="os-btn">

            <img src="../../assets/images/icons/pixels/gear-icon-Original.png"
                 alt="Settings">

        </button>

    </div>

</nav>

<!-- =========================================
     GAME WORLD
========================================== -->

<div class="game-world">

    <!-- =========================================
         PLAYER WINDOW
    ========================================== -->

    <aside class="retro-window player-window">

        <div class="window-title">

            <span>👤 PLAYER</span>

        </div>

        <div class="window-content">

            <img src="../../assets/images/hero/smeagol.png"
                 class="player-avatar"
                 alt="Player">

            <h2>Rei</h2>

            <p>Grammar Explorer</p>

            <hr>

            <p>⭐ Level 5</p>

            <p>🔥 12 Day Streak</p>

            <p>💰 350 XP</p>

        </div>

    </aside>



    <!-- =========================================
         QUEST WINDOW
    ========================================== -->

    <aside class="retro-window quest-window">

        <div class="window-title">

            <span>🏆 TODAY</span>

        </div>

        <div class="window-content">

            <h3>Daily Quest</h3>

            <p>Complete Greetings.</p>

            <div class="quest-reward">

                ⭐ +50 XP

            </div>

            <hr>

            <h3>Latest Achievement</h3>

            <p>🏆 Grammar Explorer</p>

            <hr>

            <button class="retro-btn">

                🎁 Claim Reward

            </button>

        </div>

    </aside>



    <!-- =========================================
         WORLD MAP
    ========================================== -->

    <main class="map-window">

        <div class="map-background">

            <div class="sky"></div>

            <div class="mountains"></div>

            <div class="grass"></div>

            <div class="river"></div>

            <!-- Trees -->

            <div class="tree tree1">🌸</div>
            <div class="tree tree2">🌸</div>
            <div class="tree tree3">🌸</div>
            <div class="tree tree4">🌸</div>

            <!-- Roads -->

            <div class="road road1"></div>
            <div class="road road2"></div>
            <div class="road road3"></div>
            <div class="road road4"></div>

            <!-- Buildings -->

            <button class="building intro unlocked">

                🏡

                <span>Self Introduction</span>

            </button>

            <button class="building greetings active">

                🏡

                <span>Greetings</span>

            </button>

            <button class="building numbers locked">

                🏪

                <span>Numbers</span>

            </button>

            <button class="building shrine locked">

                ⛩

                <span>Time Shrine</span>

            </button>

            <button class="building castle locked">

                🏰

                <span>Boss Castle</span>

            </button>

        </div>

    </main>

</div>



<!-- =========================================
     START MENU
========================================== -->

<div
    class="start-menu"
    id="startMenu">

    <div class="start-profile">

        <img src="../../assets/images/hero/smeagol.png"
             alt="Player">

        <div>

            <strong>Rei</strong>

            <br>

            Grammar Explorer

        </div>

    </div>

    <button>📚 Lessons</button>

    <button>📝 Flashcards</button>

    <button>🏆 Achievements</button>

    <button>⚙ Settings</button>

    <button>🚪 Logout</button>

</div>



<!-- =========================================
     TASKBAR
========================================== -->

<footer class="taskbar">

    <button
        class="start-btn"
        id="startMenuButton">

        <img
            src="../../assets/images/icons/pixels/picture-window-Original.png"
            alt="JP">

        <span>

            Menu

        </span>

    </button>

    <button>N5</button>

    <button>Flashcards</button>

    <button>Achievements</button>

    <button>Settings</button>

    <button>Quests</button>

<!--====================================
SYSTEM TRAY
=====================================-->

   <div class="system-tray">

    <div class="tray-icons">

        <button id="languageButton">ENG</button>

        <button id="displayButton">
            <img src="../../assets/images/icons/pixels/monitor.png">
        </button>

        <button id="speakerButton">
            <img src="../../assets/images/icons/pixels/headphones.png">
        </button>

        <button id="notificationButton">
            <img src="../../assets/images/icons/pixels/mail.png">
        </button>

    </div>

    <div class="tray-clock">

        <span id="taskbarClock"></span>

        <span id="taskbarDate"></span>

    </div>

</div>

<!--====================================
MUSIC PLAYER
=====================================-->

<div
    class="music-player"
    id="musicPlayer">

    <h3>

        🎵 JP Library Music

    </h3>

    <p id="currentSong">

        Kyoto

    </p>

    <input
        type="range"
        id="volumeSlider"
        min="0"
        max="100"
        value="35">

    <div class="player-controls">

        <button id="prevSong">

            ⏮

        </button>

        <button id="playPause">

            ⏸

        </button>

        <button id="nextSong">

            ⏭

        </button>

    </div>

</div>

<!-- =========================================
     AUDIO
========================================== -->

<audio
    id="bgMusic"
    loop>

    <source
        src="../../assets/sounds/Nebulite - Kyoto (freetouse.com).mp3"
        type="audio/mpeg">

</audio>


<audio
    id="teleportSound">

    <source
        src="../../assets/sounds/teleportSound.mp3"
        type="audio/mpeg">

</audio>



<!-- =========================================
     TELEPORT
========================================== -->

<div id="teleport-overlay">

    <div class="teleport-glow"></div>

    <div class="teleport-beam"></div>

    <div class="teleport-flash"></div>

</div>



<!-- =========================================
     EFFECTS
========================================== -->

<div id="achievement-container"></div>

<div id="sakura-container"></div>



<!-- =========================================
     JAVASCRIPT
========================================== -->

<script src="../../assets/js/os.js"></script>

<script src="../../assets/js/n5-map.js"></script>

<script src="../../assets/js/teleport.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
