<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================================
         META
    ========================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="JP Library OS - JLPT N5 Journey">

    <title>JLPT N5 Journey</title>

    <!-- =========================================
         GOOGLE FONTS
    ========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@300;400;600;700;800&display=swap"
          rel="stylesheet">

    <!-- DotGothic16: a Japanese pixel/dot-matrix font, used as a fallback
         in the game's "Press Start 2P" text stacks so Japanese characters
         in lesson titles (e.g. "か", "ましょう") render in a matching
         retro-pixel style instead of the browser's default font. -->
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap"
          rel="stylesheet">

    <!-- VT323: CRT-terminal readout font used for LessonBox running text
         (grammar explanations, word glosses) — Press Start 2P stays
         reserved for headers/labels, VT323 gives body copy a "techy"
         retro-terminal feel without abandoning the pixel-RPG chrome. -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
          rel="stylesheet">

    <!-- =========================================
         BOOTSTRAP
    ========================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- =========================================
         BOOTSTRAP ICONS
    ========================================== -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- =========================================
         CSS
    ========================================== -->

    <link rel="stylesheet" href="../../assets/css/variables.css">
    <link rel="stylesheet" href="../../assets/css/reset.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">

    <!-- Dashboard CSS -->

    <link rel="stylesheet"
          href="../../assets/css/n5-dashboard.css">

    <!-- Lesson dialogue box (RPG-style, DOM overlay on the Phaser canvas) -->

    <link rel="stylesheet"
          href="../../assets/css/lesson-box.css">

</head>

<body>

<!-- =========================================
     RPG HUD
========================================== -->

<header id="gameHUD">

    <!-- Left -->

    <div class="hud-left">

        <button
            class="hud-btn"
            id="backDesktop">

            <i class="bi bi-house-door-fill"></i>

            Desktop

        </button>

        <button class="hud-btn">

            🏠 Home

        </button>

        <button class="hud-btn">

            🗺 Journey

        </button>

        <button class="hud-btn">

            📚 Lessons

        </button>

    </div>

    <!-- Center -->

    <div class="hud-center">

        <img
            src="../../assets/images/logo/JPLnewlogo.png"
            alt="JP Library"
            class="hud-logo">

        <div class="hud-player">

            <img
                src="../../assets/images/avatars/smeagol.png"
                id="playerAvatar"
                alt="Player">

            <div>

                <h3 id="playerDisplayName">

                    Explorer

                </h3>

                <span id="playerRank">

                    Grammar Adventurer

                </span>

            </div>

        </div>

    </div>

    <!-- Right -->

    <div class="hud-right">

        <div class="hud-item">

            ⭐

            <span id="playerXP">

                0 XP

            </span>

        </div>

        <div class="hud-item">

            ❤️

            <span id="playerLives">

                5

            </span>

        </div>

        <div class="hud-item">

            💰

            <span id="playerCoins">

                0

            </span>

        </div>

        <button
            id="changeCharBtn"
            class="hud-btn">

            🐱 Change

        </button>

        <button
            id="musicButton"
            class="hud-btn">

            <i class="bi bi-volume-up-fill"></i>

        </button>

    </div>

</header>

<!-- =========================================
     JOURNEY MAP
========================================== -->

<main id="journeyMap">

    <div id="mapFrame">

        <div id="phaserGame"></div>

        <div id="lessonBoxOverlay" class="lesson-box-overlay" hidden></div>

    </div>

</main>

<!-- =========================================
     LESSON POPUP
========================================== -->

<div
    id="lessonPopup"
    class="lesson-popup">

    <div class="popup-window">

        <div class="popup-header">

            <h2 id="popupTitle">

                Lesson

            </h2>

            <button
                id="closePopup">

                ✕

            </button>

        </div>

        <div class="popup-body">

            <img
                id="popupImage"
                src="../../assets/images/icons/book.png"
                alt="Lesson">

            <h3 id="popupLessonTitle">

                Lesson Title

            </h3>

            <p id="popupLessonDescription">

                Lesson description...

            </p>

            <div
                class="lesson-rewards">

                ⭐ XP:
                <span id="popupXP">

                    +50

                </span>

            </div>

            <button
                id="startLessonButton"
                class="retro-btn">

                ▶ Start Lesson

            </button>

            <button
                id="favoriteLessonButton"
                class="retro-btn retro-btn-secondary">

                ⭐ Save/Favorite

            </button>

        </div>

    </div>

</div>

<!-- =========================================
     FOOTER
========================================== -->

<footer id="dashboardFooter">

    <div class="footer-left">

        🌸 JP Library OS • JLPT N5 Journey

    </div>

    <div class="footer-center">

        Continue your adventure one lesson at a time.

    </div>

    <div class="footer-right">

        Version 1.0

    </div>

</footer>

<!-- =========================================
     TELEPORT EFFECT
========================================== -->

<div id="teleport-overlay">

    <div class="teleport-beam"></div>

    <div class="teleport-flash"></div>

</div>

<!-- =========================================
     ACHIEVEMENT NOTIFICATIONS
========================================== -->

<div id="achievement-container"></div>

<!-- =========================================
     SAKURA PARTICLES
========================================== -->

<div id="sakura-container"></div>

<!-- =========================================
     BACKGROUND MUSIC
========================================== -->

<audio
    id="bgMusic"
    loop>

    <source
        src="../../assets/sounds/Nebulite - Kyoto (freetouse.com).mp3"
        type="audio/mpeg">

</audio>

<!-- =========================================
     TELEPORT SOUND
========================================== -->

<audio
    id="teleportSound">

    <source
        src="../../assets/sounds/teleportSound.mp3"
        type="audio/mpeg">

</audio>

<!-- =========================================
     JAVASCRIPT
========================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Core -->

<script src="../../assets/js/player.js"></script>

<script src="../../assets/js/sakura.js"></script>

<script src="../../assets/js/teleport.js"></script>

<script src="../../assets/js/achievement.js"></script>

<script src="../../assets/js/music-player.js"></script>

<!-- Dashboard -->

<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>

<script src="../../assets/js/lesson-box.js"></script>

<script src="../../assets/js/n5-phaser-game.js"></script>

</body>

</html>
